<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Gruber Darker VS</title>
  <desc id="description">The Gruber Darker VS mark and wordmark on a dark social card.</desc>
  <defs>
    <clipPath id="card-clip">
      <rect x="10" y="10" width="1260" height="620" rx="56"/>
    </clipPath>
  </defs>
  <rect x="10" y="10" width="1260" height="620" rx="56" fill="#141414" fill-opacity="0.97" stroke="#ffdd33" stroke-width="4" stroke-opacity="0.7"/>
  <g clip-path="url(#card-clip)">
    <circle cx="1160" cy="90" r="220" fill="#ffdd33" opacity="0.055"/>
    <circle cx="1110" cy="585" r="285" fill="#ffdd33" opacity="0.035"/>
  </g>
  <path d="M480 408H1136" stroke="#ffdd33" stroke-width="4" opacity="0.65"/>
  <g transform="translate(96 160) scale(1.25) translate(-0 -0)" aria-hidden="true">
<defs>
    <linearGradient id="bg" x1="32" y1="20" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#282828"/>
      <stop offset="0.55" stop-color="#181818"/>
      <stop offset="1" stop-color="#101010"/>
    </linearGradient>

    <linearGradient id="accent" x1="56" y1="52" x2="205" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFDD33"/>
      <stop offset="0.48" stop-color="#96A6C8"/>
      <stop offset="1" stop-color="#9E95C7"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="220" height="220" rx="44" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="28" y="28" width="200" height="200" rx="34" fill="none" stroke="#453D41" stroke-width="3"/>

  <!-- Subtle editor-line motif -->
  <path d="M55 70H118M55 93H150M55 116H106M55 139H136M55 162H96"
        stroke="#303540" stroke-width="8" stroke-linecap="round"/>

  <!-- Gruber Darker monogram mark -->
  <path d="M139 70
           C121 70 107 76 97 88
           C87 100 82 114 82 131
           C82 148 88 162 99 172
           C110 183 125 188 143 188
           C158 188 171 185 183 178
           L183 139
           H144
           V158
           H163
           V166
           C157 169 151 170 144 170
           C132 170 123 166 116 159
           C109 152 106 143 106 131
           C106 118 109 108 116 101
           C123 93 132 89 143 89
           C154 89 164 93 173 101
           L187 85
           C174 75 158 70 139 70Z"
        fill="#E4E4EF"/>

  <path d="M131 95
           H163
           C178 95 190 99 199 108
           C208 117 212 129 212 144
           C212 160 207 172 198 181
           C189 190 176 194 159 194
           H131
           V176
           H157
           C166 176 173 173 178 168
           C183 163 185 155 185 145
           C185 135 183 127 178 122
           C173 116 166 114 157 114
           H131Z"
        fill="url(#accent)" opacity="0.96"/>

  <!-- Small VS label, original text treatment, not the Visual Studio logo -->
  <g transform="translate(151 200)">
    <rect x="0" y="0" width="55" height="28" rx="9" fill="#303540" stroke="#565F73" stroke-width="1.5"/>
    <text x="27.5" y="20"
          text-anchor="middle"
          font-family="Segoe UI, Inter, Arial, sans-serif"
          font-size="16"
          font-weight="700"
          letter-spacing="1.2"
          fill="#F4F4FF">VS</text>
  </g>

  <!-- Palette sparks -->
  <circle cx="58" cy="198" r="6" fill="#73C936"/>
  <circle cx="77" cy="198" r="6" fill="#CC8C3C"/>
  <circle cx="96" cy="198" r="6" fill="#FFDD33"/>
  </g>
  <text x="480" y="325" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="80" font-weight="750" letter-spacing="-4">
    <tspan>Gruber Darker</tspan><tspan fill="#ffdd33"> VS</tspan>
  </text>
  <text x="484" y="379" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" font-weight="650" letter-spacing="2.2">
    THE GRUBER DARKER PALETTE FOR VISUAL STUDIO
  </text>
</svg>
