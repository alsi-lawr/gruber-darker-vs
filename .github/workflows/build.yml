name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: microsoft/setup-msbuild@v3

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build (Release)
        run: msbuild /restore /p:Configuration=Release /p:DeployExtension=false gruber-darker-vs.slnx

      - name: Audit theme token coverage
        run: python audit-theme.py
        working-directory: src

      - uses: actions/upload-artifact@v7
        with:
          name: gruber-darker-vs-vsix
          path: src/bin/Release/net472/gruber-darker-vs.vsix
          if-no-files-found: error
